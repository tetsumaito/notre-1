<body>
    <div class="container">
        <div>
            <div class="StudioCanvas" aria-hidden="false">
                <div class="header-section-9 appear">
                    <div id="header-placeholder">
                    </div>
                    <main class="sd header-section-10 appear">
                        <div class="sd header-section-11 appear">
                            <div class="sd header-section-12 appear">
                                <div class="sd form-container-10 appear">
                                    <h1 class="form-container-11 text">DOCUMENT REQUEST</h1>
                                    <p class="form-container-12 text">資料請求</p>
                                </div>
                                <form action="https://ssgform.com/s/lgm0ZKFhInBV" method="post" name="Notre_資料請求"
                                    class="sd form-container-13">

                                    <div style="display:none;">
                                        <input type="text" name="honeypot">
                                    </div>

                                    <label class="sd appear label-element">
                                        <div class="sd appear form-container-22">
                                            <p class="text sd appear form-container-23">お名前</p>
                                            <p class="text sd appear form-container-24">*</p>
                                        </div>
                                        <input name="お名前" placeholder="お名前" required type="text" autocomplete="off"
                                            class="sd appear form-container-25">
                                    </label>
                                    <label class="sd appear form-container-26">
                                        <div class="sd appear form-container-27">
                                            <p class="text sd appear form-container-28">フリガナ</p>
                                            <p class="text sd appear form-container-29">*</p>
                                        </div>
                                        <input name="フリガナ" placeholder="フリガナ" required type="text" autocomplete="off"
                                            class="sd appear form-container-30">
                                    </label>
                                    <label class="sd appear form-container-31">
                                        <div class="sd appear form-container-32">
                                            <p class="text sd appear form-container-33">メールアドレス</p>
                                            <p class="text sd appear form-container-34">*</p>
                                        </div>
                                        <input name="メールアドレス" placeholder="メールアドレス" required type="email"
                                            autocomplete="off" class="sd appear form-container-35">
                                    </label>
                                    <label class="sd appear form-container-36">
                                        <div class="sd appear form-container-37">
                                            <p class="text sd appear form-container-38">メールアドレス（確認用）</p>
                                            <p class="text sd appear form-container-39">*</p>
                                        </div>
                                        <input name="メールアドレス（確認用）" placeholder="メールアドレス（確認用）" required type="email"
                                            autocomplete="off" class="sd appear form-container-40">
                                    </label>
                                    <label class="sd appear form-container-36">
                                        <div class="sd appear form-container-37">
                                          <p class="text sd appear form-container-38">電話番号</p>
                                          <p class="text sd appear form-container-39">*</p>
                                        </div>
                                        <input name="電話番号" placeholder="電話番号" required type="tel" autocomplete="off" class="sd appear form-container-40">
                                      </label>
                                    <label class="sd appear form-container-41">
                                        <div class="sd appear form-container-42">
                                            <p class="text sd appear form-container-43">会社名</p>
                                            <p class="text sd appear form-container-44">*</p>
                                        </div>
                                        <input name="会社名" placeholder="会社名" required type="text" autocomplete="off"
                                            class="sd appear form-container-45">
                                    </label>
                                    <label class="sd appear form-container-41">
                                        <div class="sd appear form-container-42">
                                          <p class="text sd appear form-container-43">当サイトを知ったきっかけ</p>
                                          <p class="text sd appear form-container-44">*</p>
                                        </div>
                                        <select name="知ったきっかけ" required class="sd appear form-container-45" style="appearance: auto; cursor: pointer; padding-top: 15px;">
                                          <option value="" disabled selected>選択してください</option>
                                          <option value="Gemini, ChatGPT等）">AI検索（Gemini, ChatGPT等）</option>
                                          <option value="通常の検索（Google, Yahoo!等）">通常の検索（Google, Yahoo!等）</option>
                                          <option value="SNS（X, Instagram等）">SNS（X, Instagram等）</option>
                                          <option value="知人・専門家からの紹介">知人・専門家からの紹介</option>
                                          <option value="その他">その他</option>
                                        </select>
                                      </label>
                                    <label class="sd appear form-container-51">
                                        <input name="Confirm" required type="checkbox" class="sd button-secondary-11">
                                        <p class="text sd appear button-secondary-12">プライバシーポリシーに同意する</p>
                                    </label>

                                        <div class="sd appear button-secondary-13">
                                            <p class="text sd appear footer-section-2">送信する</p>
                                        </div>
                                    </button>
