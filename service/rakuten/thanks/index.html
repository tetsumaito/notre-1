<html lang="ja">
    <head>
        <meta charset="UTF-8" />

        <link rel="icon" href="../images/favicon.ico" sizes="any" />
        <link

            type="image/png"
            sizes="32x32"

        <link rel="apple-touch-icon" href="../images/apple-touch-icon.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />

        <link

        <!-- Google Tag Manager（Notreコーポレート共通コンテナ） -->
        <script>
            (function (w, d, s, l, i) {
                w[l] = w[l] || [];
                w[l].push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
                var f = d.getElementsByTagName(s)[0],
                    j = d.createElement(s),
                    dl = l != "dataLayer" ? "&l=" + l : "";
                j.async = true;
                j.src = "https://www.googletagmanager.com/gtm.js?id=" + i + dl;
                f.parentNode.insertBefore(j, f);
            })(window, document, "script", "dataLayer", "GTM-5NCSF7DH");
        </script>
        <!-- Meta Pixel（楽天EC_LP_Pixel 1250132826712883 / Notre）: PageView + Lead（eventID dedup + CAPI） -->
        <script>
            !(function (f, b, e, v, n, t, s) {
                if (f.fbq) return;
                n = f.fbq = function () {
                    n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments);
                };
                if (!f._fbq) f._fbq = n;
                n.push = n;
                n.loaded = !0;
                n.version = "2.0";
                n.queue = [];
                t = b.createElement(e);
                t.async = !0;
                t.src = v;
                s = b.getElementsByTagName(e)[0];
                s.parentNode.insertBefore(t, s);
            })(window, document, "script", "https://connect.facebook.net/en_US/fbevents.js");
            fbq("init", "1250132826712883");
            fbq("track", "PageView");
            // サンクス到達＝フォーム送信成功（ssgform のリダイレクト先）。
            // LPで保存したリード情報があれば eventID 付き Lead + サーバー側CAPI を送り重複排除する。
            (function () {
                var lead = null;
                try {
                    lead = JSON.parse(
                        localStorage.getItem("notre_capi_lead") || "null",
                    );
                } catch (e) {}
                if (lead && lead.eventId) {
                    fbq(
                        "track",
                        "Lead",
                        {
                            content_name: "店舗診断申込",
                            content_category: "rakuten-consulting",
                            value: lead.value || 5000,
                            currency: lead.currency || "JPY",
                        },
                        { eventID: lead.eventId },
                    );
                    try {
                        fetch("/api/capi-lead", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            keepalive: true,
                            body: JSON.stringify({
                                eventId: lead.eventId,
                                email: lead.email,
                                phone: lead.phone,
                                name: lead.name,
                                fbc: lead.fbc,
                                fbp: lead.fbp,
                                eventSourceUrl:
                                    lead.eventSourceUrl || location.href,
                                value: lead.value || 5000,
                                currency: lead.currency || "JPY",
                                contentName: "店舗診断申込",
                                contentCategory: "rakuten-consulting",
                            }),
                        }).catch(function () {});
                    } catch (e) {}
                    try {
                        localStorage.removeItem("notre_capi_lead");
                    } catch (e) {}
                }
                // 直アクセス・リロード・ブックマーク再訪では保存データが無い → 何も送らない。
            })();
        </script>
        <noscript
            ><img
                height="1"
                width="1"
                style="display: none"
                src="https://www.facebook.com/tr?id=1250132826712883&ev=PageView&noscript=1"
        /></noscript>
        <style>
            :root {
                --ink: #1c1719;
                --ink-2: #534341;
                --ink-3: #857370;
                --red: #b00020;
                --red-d: #8a0016;
                --line: #e8dedc;
                --jp: "Noto Sans JP", sans-serif;
                --dp: "Inter", "Noto Sans JP", sans-serif;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: #fff;
                color: var(--ink);
                font-family: var(--jp);
                line-height: 1.7;
                -webkit-font-smoothing: antialiased;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }
            /* FVと同じグラデ円の世界観 */
            .blobs {
                position: fixed;
                inset: 0;
                z-index: 0;
                overflow: hidden;
                pointer-events: none;
            }
            .blob {
                position: absolute;
                aspect-ratio: 1;
                opacity: 0.5;
                filter: blur(8px);
            }
            .blob1 {
                width: 34%;
                top: -16%;
                left: -10%;
                border-radius: 58% 42% 60% 40% / 48% 55% 45% 52%;
                background: linear-gradient(
                    135deg,
                    #ff8a2e 0%,
                    #ff2d6b 50%,
                    #c70028 100%
                );
                animation: spin 46s linear infinite;
            }
            .blob2 {
                width: 28%;
                bottom: -16%;
                right: -8%;
                border-radius: 46% 54% 42% 58% / 56% 44% 60% 40%;
                background: linear-gradient(
                    210deg,
                    #ff7a5a 0%,
                    #e4002b 56%,
                    #b00020 100%
                );
                animation: spin 60s linear infinite reverse;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            @media (prefers-reduced-motion: reduce) {
                .blob {
                    animation: none;
                }
            }
            main {
                position: relative;
                z-index: 1;
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 80px 22px;
            }
            .card {
                width: 100%;
                max-width: 560px;
                background: #fff;
                border: 1px solid var(--line);
                border-radius: 22px;
                padding: 56px 44px 48px;
                text-align: center;
                box-shadow: 0 44px 90px -54px rgba(176, 0, 32, 0.4);
            }
            .check {
                width: 66px;
                height: 66px;
                margin: 0 auto 26px;
                border-radius: 50%;
                background: linear-gradient(135deg, #ff8a2e, #ff2d6b 55%, #c70028);
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .check svg {
                width: 30px;
                height: 30px;
            }
            .eyebrow {
                font-family: var(--dp);
                font-size: 12px;
                font-weight: 800;
                letter-spacing: 0.14em;
                color: var(--red);
                margin-bottom: 12px;
            }
            h1 {
                font-size: 26px;
                font-weight: 800;
                letter-spacing: -0.01em;
                line-height: 1.45;
                margin-bottom: 18px;
            }
            .lead {
                font-size: 15px;
                color: var(--ink-2);
                font-weight: 500;
                margin-bottom: 26px;
            }
            .steps {
                text-align: left;
                background: #fbf8f7;
                border: 1px solid var(--line);
                border-radius: 14px;
                padding: 20px 22px;
                margin-bottom: 30px;
            }
            .steps p {
                font-size: 13px;
                color: var(--ink-2);
                font-weight: 500;
                padding-left: 24px;
                position: relative;
                margin-bottom: 10px;
            }
            .steps p:last-child {
                margin-bottom: 0;
            }
            .steps p::before {
                content: "";
                position: absolute;
                left: 0;
                top: 7px;
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: var(--red);
            }
            .steps b {
                color: var(--ink);
                font-weight: 700;
            }
            .home {
                display: inline-flex;
                align-items: center;
                gap: 10px;
                background: var(--red);
                color: #fff;
                font-size: 15px;
                font-weight: 700;
                padding: 14px 30px;
                border-radius: 999px;
                text-decoration: none;
                transition: 0.18s;
            }
            .home:hover {
                background: var(--red-d);
                transform: translateY(-2px);
                box-shadow: 0 14px 30px -12px rgba(176, 0, 32, 0.55);
            }
            footer {
                position: relative;
                z-index: 1;
                text-align: center;
                font-size: 11.5px;
                color: var(--ink-3);
                padding: 24px;
                font-family: var(--dp);
            }
            @media (max-width: 480px) {
                .card {
                    padding: 44px 26px 40px;
                }
                h1 {
                    font-size: 22px;
                }
            }
        </style>
    </head>
    <body>
        <!-- Google Tag Manager (noscript) -->

        <div class="blobs" aria-hidden="true">
            <div class="blob blob1"></div>
            <div class="blob blob2"></div>
        </div>
        <main>
            <div class="card">
                <div class="check" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path
                            d="M5 12.5l4.2 4.2L19 7"
                            stroke="#fff"
                            stroke-width="2.6"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        />
                    </svg>
                </div>
                <div class="eyebrow">SUBMITTED</div>
                <h1>お申し込み、<br />ありがとうございます。</h1>
                <p class="lead">
                    楽天“売上”診断のお申し込みを受け付けました。<br />元楽天ECCが内容を確認し、担当よりご連絡いたします。
                </p>
                <div class="steps">
                    <p>
                        <b>確認メールを自動送信</b>しています。届かない場合は迷惑メールフォルダをご確認ください。
                    </p>
                    <p>
                        通常 <b>2〜3営業日以内</b> に担当よりご連絡いたします。
                    </p>
                    <p>
                        お急ぎの場合は
                        <b>info@notre.co.jp</b> までご連絡ください。
                    </p>
                </div>
                <a class="home" href="https://notre.co.jp"
                    >Notre公式サイトへ</a
                >
            </div>
        </main>
        <footer>© Notre Inc.</footer>
    </body>
</html>
