<html lang="ja">

<head>
  <meta charset="UTF-8" />

  <title>お申し込みありがとうございました｜Notre</title>
  <meta name="description" content="無料診断のお申し込みを受け付けました。5営業日以内に担当者よりご連絡いたします。" />
  <link rel="canonical" href="https://notre.co.jp/lp/rakuten-ec-article/thanks/" />
  <link rel="icon" href="../images/Notre_favicon.jpg" type="image/jpeg" />

  <script>(function (w, d, s, l, i) {
      w[l] = w[l] || []; w[l].push({
        'gtm.start': new Date().getTime(), event: 'gtm.js'
      }); var f = d.getElementsByTagName(s)[0],
        j = d.createElement(s), dl = l != 'dataLayer' ? '&l=' + l : ''; j.async = true; j.src =
          'https://www.googletagmanager.com/gtm.js?id=' + i + dl; f.parentNode.insertBefore(j, f);
    })(window, document, 'script', 'dataLayer', 'GTM-5NCSF7DH');</script>

  <script>
    !function (f, b, e, v, n, t, s) {
      if (f.fbq) return; n = f.fbq = function () {
        n.callMethod ?
          n.callMethod.apply(n, arguments) : n.queue.push(arguments)
      };
      if (!f._fbq) f._fbq = n; n.push = n; n.loaded = !0; n.version = '2.0';
      n.queue = []; t = b.createElement(e); t.async = !0;
      t.src = v; s = b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t, s)
    }(window, document, 'script',
      'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '1250132826712883');
    fbq('track', 'PageView');
    // サンクス到達＝フォーム送信成功（ssgform のリダイレクト先）。
    // LPで保存したリード情報があれば eventID 付き Lead + サーバー側CAPI を送り重複排除する。
    (function () {
      var lead = null;
      try { lead = JSON.parse(localStorage.getItem('notre_capi_lead') || 'null'); } catch (e) {}
      if (lead && lead.eventId) {
        fbq('track', 'Lead', {
          content_name: '無料診断申込',
          content_category: 'rakuten-ec-article',
          value: lead.value || 5000,
          currency: lead.currency || 'JPY'
        }, { eventID: lead.eventId });
        try {
          fetch('/api/capi-lead', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            keepalive: true,
            body: JSON.stringify({
              eventId: lead.eventId,
              email: lead.email,
              phone: lead.phone,
              name: lead.name,
              fbc: lead.fbc,
              fbp: lead.fbp,
              eventSourceUrl: lead.eventSourceUrl || location.href,
              value: lead.value || 5000,
              currency: lead.currency || 'JPY'
            })
          }).catch(function () {});
        } catch (e) {}
        try { localStorage.removeItem('notre_capi_lead'); } catch (e) {}
      } else {
        // 保存データが無い場合（localStorage不可/直接訪問）でも、到達＝CV として Lead は送る
        fbq('track', 'Lead', {
          content_name: '無料診断申込',
          content_category: 'rakuten-ec-article',
          value: 0,
          currency: 'JPY'
        });
      }
    })();
  </script>
  <noscript><img height="1" width="1" style="display:none"

  <script>

  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #BF0101;
      --on-surface: #1B1C1C;
      --on-surface-variant: #5D3F3B;
      --surface: #FCF9F8;
      --surface-container-lowest: #FFFFFF;
      --outline-variant: #E7BDB6;
      --line-green: #06C755;
    }
    body {
      font-family: 'Noto Sans JP', system-ui, -apple-system, sans-serif;
      background: var(--surface);
      color: var(--on-surface);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      line-height: 1.7;
    }
    .thanks-card {
      max-width: 560px;
      width: 100%;
      background: var(--surface-container-lowest);
      border: 1px solid var(--outline-variant);
      border-radius: 16px;
      padding: 48px 32px;
      text-align: center;
      box-shadow: 0 10px 30px -18px rgba(0,0,0,0.18);
    }
    .thanks-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--line-green);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    .thanks-icon svg { width: 40px; height: 40px; }
    .thanks-title {
      font-family: 'Noto Serif JP', 'Noto Sans JP', serif;
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--on-surface);
      margin-bottom: 16px;
      line-height: 1.4;
    }
    .thanks-lead {
      color: var(--on-surface-variant);
      margin-bottom: 24px;
      font-size: 0.95rem;
    }
    .thanks-steps {
      text-align: left;
      background: rgba(0,0,0,0.03);
      border-radius: 10px;
      padding: 20px 24px;
      margin: 24px 0;
    }
    .thanks-steps h3 {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--primary);
      margin-bottom: 12px;
    }
    .thanks-steps ol {
      padding-left: 20px;
      color: var(--on-surface);
      font-size: 0.92rem;
    }
    .thanks-steps li { margin-bottom: 6px; }
    .thanks-back {
      display: inline-block;
      margin-top: 16px;
      color: var(--on-surface-variant);
      font-size: 0.88rem;
      text-decoration: underline;
    }
    .thanks-back:hover { color: var(--primary); }
    .thanks-footer {
      margin-top: 32px;
      font-size: 0.78rem;
      color: var(--on-surface-variant);
      text-align: center;
    }
    @media (max-width: 640px) {
      .thanks-card { padding: 36px 22px; }
      .thanks-title { font-size: 1.2rem; }
    }
  </style>
</head>

<body>
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5NCSF7DH" height="0" width="0"
      style="display:none;visibility:hidden"></iframe></noscript>

  <main class="thanks-card">
    <div class="thanks-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
      </svg>
    </div>
    <h1 class="thanks-title">お申し込みありがとうございました</h1>
    <p class="thanks-lead">
      無料診断のお申し込みを受け付けました。<br>
      ご記入いただいたメールアドレス宛に、確認メールをお送りしています。
    </p>

    <div class="thanks-steps">
      <h3>今後の流れ</h3>
      <ol>
        <li>担当者がご店舗の状況を確認します</li>
        <li>5営業日以内に、貴店専用の利益改善レポートをメールでお届けします</li>
        <li>レポートをご確認のうえ、ご希望があれば30分の無料オンライン面談にご案内します</li>
      </ol>
    </div>

    <p class="thanks-lead" style="font-size:0.85rem;">
      ※確認メールが届かない場合は、迷惑メールフォルダもご確認ください。<br>
      それでも届かない場合は、お手数ですが <a href="https://www.notre.co.jp/contact/" style="color:var(--primary);">お問い合わせフォーム</a> よりご連絡ください。
    </p>

    <a href="https://www.notre.co.jp/" class="thanks-back">Notre トップページへ戻る</a>

    <div class="thanks-footer">
      Notre株式会社 &copy; 2026
    </div>
  </main>
</body>

</html>
